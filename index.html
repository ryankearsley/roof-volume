<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roof Volume Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light py-4">
<div class="container">

  <div class="text-center mb-4">
    <h1 class="h3 fw-bold">🏠 Roof Volume Calculator</h1>
    <p class="text-muted mb-0">Calculate the enclosed volume of a roof from its dimensions.</p>
  </div>

  <!-- Roof type selector -->
  <div class="d-flex justify-content-center gap-3 mb-4">
    <div class="card roof-card active" data-type="gable" onclick="selectRoof('gable')">
      <div class="card-body text-center py-3 px-4">
        <svg width="64" height="44" viewBox="0 0 64 44" class="d-block mx-auto mb-2">
          <rect x="4" y="22" width="56" height="18" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="1"/>
          <polygon points="32,4 60,22 4,22" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <div class="small fw-semibold card-label">Gable</div>
      </div>
    </div>
    <div class="card roof-card" data-type="extension" onclick="selectRoof('extension')">
      <div class="card-body text-center py-3 px-4">
        <svg width="64" height="44" viewBox="0 0 64 44" class="d-block mx-auto mb-2">
          <!-- Main house roof (vertical rectangle, plan view) -->
          <rect x="4" y="4" width="22" height="36" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" rx="1"/>
          <!-- Extension (horizontal rectangle off the right) -->
          <rect x="26" y="12" width="34" height="20" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5" rx="1"/>
          <!-- Valley lines (junction from extension corners to main house ridge) -->
          <line x1="26" y1="12" x2="15" y2="22" stroke="#1d4ed8" stroke-width="1.8"/>
          <line x1="26" y1="32" x2="15" y2="22" stroke="#1d4ed8" stroke-width="1.8"/>
        </svg>
        <div class="small fw-semibold card-label">Extension</div>
      </div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card shadow-sm mb-4">
    <div class="card-body p-4">

      <!-- Controls (units + height mode toggles) -->
      <div id="controls-row"></div>

      <!-- Diagram -->
      <div id="diagram" class="diagram-wrap text-center bg-light border rounded p-3 mb-4"></div>

      <!-- Inputs -->
      <div id="inputs-container" class="mb-3"></div>

      <div id="error-msg" class="alert alert-danger d-none py-2 mb-3"></div>

      <button class="btn btn-primary w-100 py-2 fw-bold fs-5" onclick="calculate()">Calculate Volume</button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="d-none mb-4">
    <div class="result-card">
      <div class="result-label" id="result-roof-label"></div>
      <div class="result-value" id="result-value"></div>
      <div class="result-unit" id="result-unit"></div>
      <div class="result-alt" id="result-alt"></div>
      <div id="result-breakdown" class="d-none mt-3 pt-3" style="border-top:1px solid rgba(255,255,255,0.3)"></div>
      <div class="result-formula" id="result-formula"></div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
