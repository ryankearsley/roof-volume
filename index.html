<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roof Volume Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V21H3V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </div>
        <div>
          <h1 class="header-title">Roof Volume Calculator</h1>
          <p class="header-subtitle">Calculate the enclosed volume of a roof from its dimensions</p>
        </div>
      </div>
    </div>
  </header>

  <main class="site-main">
  <div class="container">

    <!-- Roof type selector -->
    <section class="section-block">
      <div class="section-label">Select roof type</div>
      <div class="roof-type-row">

        <div class="roof-card active" data-type="gable" onclick="selectRoof('gable')">
          <div class="roof-card-inner">
            <!-- 3D perspective: front-left-above. X=length, Z=depth (+12,-8 per unit), Y=height (-18) -->
            <!-- FL=5,38  FR=38,38  BL=17,30  BR=50,30  RL=11,16  RR=44,16 -->
            <svg width="56" height="40" viewBox="0 0 64 44" class="roof-card-icon">
              <polygon points="17,30 50,30 44,16 11,16" fill="rgba(147,197,253,0.32)" stroke="#2563eb" stroke-width="1.2"/>
              <polygon points="5,38 38,38 44,16 11,16"  fill="rgba(191,219,254,0.88)" stroke="#2563eb" stroke-width="1.4"/>
              <polygon points="5,38 17,30 11,16"         fill="rgba(219,234,254,0.92)" stroke="#2563eb" stroke-width="1.4"/>
              <polygon points="38,38 50,30 44,16"        fill="rgba(147,197,253,0.48)" stroke="#2563eb" stroke-width="1.2"/>
              <line x1="11" y1="16" x2="44" y2="16" stroke="#1d4ed8" stroke-width="2"/>
            </svg>
            <span class="roof-card-label">Gable</span>
          </div>
        </div>

        <div class="roof-card" data-type="pitch" onclick="selectRoof('pitch')">
          <div class="roof-card-inner">
            <span id="pitch-card-icon">
              <svg width="56" height="40" viewBox="0 0 64 44" class="roof-card-icon">
                <polygon points="16,6 48,6 60,22 48,38 16,38 4,22" fill="#bfdbfe" stroke="#2563eb" stroke-width="1.5"/>
                <line x1="22" y1="22" x2="42" y2="22" stroke="#1d4ed8" stroke-width="2"/>
                <line x1="22" y1="22" x2="16" y2="6"  stroke="#94a3b8" stroke-width="1"/>
                <line x1="22" y1="22" x2="16" y2="38" stroke="#94a3b8" stroke-width="1"/>
                <line x1="42" y1="22" x2="48" y2="6"  stroke="#94a3b8" stroke-width="1"/>
                <line x1="42" y1="22" x2="48" y2="38" stroke="#94a3b8" stroke-width="1"/>
              </svg>
            </span>
            <span class="roof-card-label">Pitch</span>
          </div>
        </div>

        <div class="roof-card" data-type="leanto" onclick="selectRoof('leanto')">
          <div class="roof-card-inner">
            <!-- Lean-to: high at back, low at front. BL=17,30 (back eave), BTL=17,16 (back top), BTR=50,16 -->
            <svg width="56" height="40" viewBox="0 0 64 44" class="roof-card-icon">
              <polygon points="5,38 17,30 17,16"          fill="rgba(219,234,254,0.92)" stroke="#2563eb" stroke-width="1.4"/>
              <polygon points="5,38 38,38 50,16 17,16"    fill="rgba(191,219,254,0.88)" stroke="#2563eb" stroke-width="1.4"/>
              <line x1="17" y1="16" x2="50" y2="16" stroke="#1d4ed8" stroke-width="2"/>
            </svg>
            <span class="roof-card-label">Lean-to</span>
          </div>
        </div>

        <div class="roof-type-divider"></div>

        <div class="roof-card" data-type="extension" onclick="selectRoof('extension')">
          <div class="roof-card-inner">
            <!-- Extension: hip pyramid on left (JA=13,22) + gable section on right -->
            <!-- JA=13,22  ML=16,38  MR=27,31  RA=22,22  EL=34,38  ER=45,31  GA=40,22 -->
            <!-- Ridge: JA→RA→GA all at y=22 (horizontal) -->
            <svg width="56" height="40" viewBox="0 0 64 44" class="roof-card-icon">
              <polygon points="16,38 27,31 13,22"         fill="rgba(147,197,253,0.22)" stroke="#2563eb" stroke-width="1"/>
              <polygon points="27,31 22,22 13,22"         fill="rgba(147,197,253,0.32)" stroke="#2563eb" stroke-width="1.1"/>
              <polygon points="27,31 45,31 40,22 22,22"   fill="rgba(147,197,253,0.32)" stroke="#2563eb" stroke-width="1.1"/>
              <polygon points="16,38 22,22 13,22"         fill="rgba(191,219,254,0.78)" stroke="#2563eb" stroke-width="1.3"/>
              <polygon points="16,38 34,38 40,22 22,22"   fill="rgba(191,219,254,0.88)" stroke="#2563eb" stroke-width="1.4"/>
              <polygon points="34,38 45,31 40,22"         fill="rgba(219,234,254,0.92)" stroke="#2563eb" stroke-width="1.4"/>
              <line x1="13" y1="22" x2="40" y2="22" stroke="#1d4ed8" stroke-width="2"/>
            </svg>
            <span class="roof-card-label">Extension</span>
          </div>
        </div>

      </div>
    </section>

    <!-- Calculator card -->
    <div class="calc-card">

      <!-- Controls -->
      <div id="controls-row"></div>

      <!-- Diagram -->
      <div id="diagram" class="diagram-wrap"></div>

      <!-- Divider -->
      <div class="calc-divider"></div>

      <!-- Inputs -->
      <div id="inputs-container" class="mb-4"></div>

      <!-- Error -->
      <div id="error-msg" class="calc-error d-none"></div>

      <!-- CTA -->
      <button class="calc-btn" onclick="calculate()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:-2px">
          <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/>
        </svg>
        Calculate Volume
      </button>
    </div>

    <!-- Result -->
    <div id="result" class="d-none">
      <div class="result-card">
        <div class="result-header">
          <span class="result-label" id="result-roof-label"></span>
        </div>
        <div class="result-body">
          <span class="result-value" id="result-value"></span>
          <span class="result-unit" id="result-unit"></span>
        </div>
        <div class="result-alt" id="result-alt"></div>
        <div id="result-breakdown" class="d-none result-breakdown"></div>
        <div class="result-formula" id="result-formula"></div>
        <!-- Save row -->
        <div class="result-save-row">
          <input type="text" id="save-label" class="save-label-input" placeholder="Label this calculation (e.g. Main house)…" maxlength="60" />
          <button class="save-btn" onclick="saveCalculation()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- Saved calculations -->
    <div id="saved-section" class="d-none">
      <div class="saved-header">
        <div class="section-label mb-0">Saved calculations</div>
        <div class="saved-header-actions">
          <button class="print-btn" onclick="printSummary()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print summary
          </button>
          <button class="clear-btn" onclick="clearAllCalculations()">Clear all</button>
        </div>
      </div>
      <div id="saved-list"></div>
      <div class="saved-total" id="saved-total"></div>
    </div>

  </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="diagrams3d.js"></script>
<script src="app.js"></script>
</body>
</html>
